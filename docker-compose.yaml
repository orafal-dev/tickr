# Coolify: attach domains to `web` and `api` in the UI (traffic reaches them on the Docker
# network). Avoid fixed host `ports:` here — they collide on shared hosts and bypass the proxy.
# For localhost, add: `-f docker-compose.local.yaml`.
#
# First deploy can look "stuck" on `setup` while `bun install` fills named volumes; Postgres
# may become healthy long before install finishes. Watch logs for the `setup` service.
#
# Named `node_modules` volumes keep installs off the bind-mounted repo (very slow on macOS).

x-workspace-volumes: &workspace-volumes
  - .:/workspace
  - bun-cache:/root/.bun/install/cache
  - node-modules-root:/workspace/node_modules
  - node-modules-web:/workspace/apps/web/node_modules
  - node-modules-api:/workspace/apps/api/node_modules
  - node-modules-ui:/workspace/packages/ui/node_modules
  - node-modules-eslint:/workspace/packages/eslint-config/node_modules
  - node-modules-transactional:/workspace/packages/transactional/node_modules

x-bun-service: &bun-service
  image: oven/bun:1.3.10-alpine
  working_dir: /workspace
  volumes: *workspace-volumes

services:
  setup:
    <<: *bun-service
    environment:
      CI: "true"
    command:
      - sh
      - -ec
      - |
        echo "[setup] bun install --frozen-lockfile (first run can take several minutes)"
        bun install --frozen-lockfile
        echo "[setup] finished"

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tickr
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tickr"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    <<: *bun-service
    init: true
    command: bun run --cwd apps/api dev
    restart: unless-stopped
    env_file:
      - apps/api/.env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/tickr
      API_PORT: "3001"
    expose:
      - "3001"
    depends_on:
      setup:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy

  web:
    <<: *bun-service
    init: true
    # Larger /dev/shm avoids intermittent Next/webpack dev crashes under small defaults.
    shm_size: "1gb"
    # Webpack dev uses less RAM than Turbopack; Turbopack often OOM-restarts in Docker Desktop.
    command:
      - sh
      - -ec
      - exec ./apps/web/node_modules/.bin/next dev apps/web --webpack --hostname 0.0.0.0 --port 3000
    restart: unless-stopped
    env_file:
      - apps/web/.env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/tickr
      API_URL: http://api:3001
      USESEND_BASE_URL: https://usesend-wcw0o04ckwss04wwwkwo0kok.botox.boo
      BETTER_AUTH_URL: ${SERVICE_URL_WEB:-http://localhost:3000}
      NEXT_PUBLIC_APP_URL: ${SERVICE_URL_WEB:-http://localhost:3000}
    expose:
      - "3000"
    depends_on:
      setup:
        condition: service_completed_successfully
      api:
        condition: service_started
      postgres:
        condition: service_healthy

volumes:
  postgres-data:
  bun-cache:
  node-modules-root:
  node-modules-web:
  node-modules-api:
  node-modules-ui:
  node-modules-eslint:
  node-modules-transactional:
