# Coolify: assign domains to `web` and `api` in the UI (proxy reaches these via the
# Docker network). Avoid publishing fixed host ports here — they conflict on shared hosts
# and bypass the proxy. For localhost access, use docker-compose.local.yaml (see file).
#
# Install deps into named volumes under node_modules (not the bind-mounted repo tree).
# Writing thousands of small files to a macOS/Windows bind mount is very slow and often
# looks "stuck"; native volumes complete in a reasonable time.
x-workspace-volumes: &workspace-volumes
  - .:/workspace
  - bun-cache:/root/.bun/install/cache
  - node-modules-root:/workspace/node_modules
  - node-modules-web:/workspace/apps/web/node_modules
  - node-modules-api:/workspace/apps/api/node_modules
  - node-modules-ui:/workspace/packages/ui/node_modules
  - node-modules-eslint:/workspace/packages/eslint-config/node_modules
  - node-modules-transactional:/workspace/packages/transactional/node_modules

services:
  setup:
    image: oven/bun:1.3.10-alpine
    working_dir: /workspace
    environment:
      CI: "true"
    command: ["sh", "-ec", "bun install --frozen-lockfile"]
    volumes: *workspace-volumes

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tickr
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tickr"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    image: oven/bun:1.3.10-alpine
    working_dir: /workspace
    command: bun run --cwd apps/api dev
    restart: unless-stopped
    env_file:
      - apps/api/.env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/tickr
      API_PORT: "3001"
    expose:
      - "3001"
    volumes: *workspace-volumes
    depends_on:
      setup:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy

  web:
    image: oven/bun:1.3.10-alpine
    working_dir: /workspace
    command: bun run --cwd apps/web dev -- --hostname 0.0.0.0 --port 3000
    restart: unless-stopped
    env_file:
      - apps/web/.env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/tickr
      API_URL: http://api:3001
      USESEND_BASE_URL: https://usesend-wcw0o04ckwss04wwwkwo0kok.botox.boo
      # Coolify injects SERVICE_URL_WEB when the `web` service has a domain configured.
      BETTER_AUTH_URL: ${SERVICE_URL_WEB:-http://localhost:3000}
      NEXT_PUBLIC_APP_URL: ${SERVICE_URL_WEB:-http://localhost:3000}
    expose:
      - "3000"
    volumes: *workspace-volumes
    depends_on:
      setup:
        condition: service_completed_successfully
      api:
        condition: service_started
      postgres:
        condition: service_healthy

volumes:
  postgres-data:
  bun-cache:
  node-modules-root:
  node-modules-web:
  node-modules-api:
  node-modules-ui:
  node-modules-eslint:
  node-modules-transactional:
