# Tickr stack for production/self-hosting (Coolify-friendly).
#
# Coolify: assign a domain to `web` with container port 3000. Keep `api` and
# `postgres` private unless you intentionally expose the API. Override every
# `${VAR:-…}` default in the Coolify UI for production (or use shared/generated
# secrets). Defaults exist so `docker compose build` works without a host `.env`.
# After first deploy, run Better Auth migrations once from a machine
# with Bun and this repo (the production web image is Node-only), for example:
#   DATABASE_URL="postgresql://…" cd apps/web && bun run auth:migrate
#
# If you use Coolify-managed Postgres instead of this compose service, remove
# `postgres`, point `DATABASE_URL` at your external database, and drop
# `depends_on` conditions that reference `postgres`.

name: tickr

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tickr}
      POSTGRES_DB: ${POSTGRES_DB:-tickr}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tickr_dev_insecure_postgres_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB" -h 127.0.0.1',
        ]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 15s

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    expose:
      - "3001"
    environment:
      NODE_ENV: production
      API_PORT: "3001"
      DATABASE_URL: postgresql://${POSTGRES_USER:-tickr}:${POSTGRES_PASSWORD:-tickr_dev_insecure_postgres_password}@postgres:5432/${POSTGRES_DB:-tickr}
      API_INTERNAL_KEY: ${API_INTERNAL_KEY:-local-development-api-internal-key}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "bun -e \"fetch('http://127.0.0.1:3001/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: 0.0.0.0
      DATABASE_URL: postgresql://${POSTGRES_USER:-tickr}:${POSTGRES_PASSWORD:-tickr_dev_insecure_postgres_password}@postgres:5432/${POSTGRES_DB:-tickr}
      API_URL: http://api:3001
      API_INTERNAL_KEY: ${API_INTERNAL_KEY:-local-development-api-internal-key}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-dev-only-change-me-better-auth-secret-min-32-chars}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:3000}
      BETTER_AUTH_API_KEY: ${BETTER_AUTH_API_KEY:-}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      USESEND_API_KEY: ${USESEND_API_KEY:-}
      USESEND_BASE_URL: ${USESEND_BASE_URL:-}
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 90s

volumes:
  postgres_data:
