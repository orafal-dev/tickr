services:
  setup:
    image: oven/bun:1.3.10-alpine
    working_dir: /workspace
    volumes:
      - .:/workspace
    environment:
      CI: "true"
    command: bun install --frozen-lockfile

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tickr
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tickr"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    image: oven/bun:1.3.10-alpine
    working_dir: /workspace
    volumes:
      - .:/workspace
    command: bun run --cwd apps/api dev
    restart: unless-stopped
    env_file:
      - apps/api/.env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/tickr
      API_PORT: "3001"
    expose:
      - "3001"
    depends_on:
      setup:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy

  web:
    image: oven/bun:1.3.10-alpine
    working_dir: /workspace
    volumes:
      - .:/workspace
    command: bun run --cwd apps/web dev -- --hostname 0.0.0.0 --port 3000
    restart: unless-stopped
    env_file:
      - apps/web/.env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/tickr
      API_URL: http://api:3001
      BETTER_AUTH_URL: ${SERVICE_URL_WEB:-http://localhost:3000}
      NEXT_PUBLIC_APP_URL: ${SERVICE_URL_WEB:-http://localhost:3000}
    expose:
      - "3000"
    depends_on:
      setup:
        condition: service_completed_successfully
      api:
        condition: service_started
      postgres:
        condition: service_healthy

volumes:
  postgres-data:
